name: Sync Rules

on:
  push:
    branches: [master]
    paths:
      - 'Surge/RULE-SET/**'
      - '.github/scripts/sync-rules.txt'
      - '.github/scripts/sync-rules.py'
  schedule:
    - cron: '0 16 * * *'   # 每天 UTC 16:00 = UTC+8 00:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: git clone --depth=1 "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" .

      - name: Run sync script
        run: python3 .github/scripts/sync-rules.py

      - name: Compile sing-box rule-sets to .srs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo SagerNet/sing-box --pattern "sing-box-*-linux-amd64.tar.gz" -D /tmp/sb
          for f in /tmp/sb/*.tar.gz; do tar -xzf "$f" -C /tmp/sb; done
          sudo install -m755 "$(find /tmp/sb -name 'sing-box' -type f | head -1)" /usr/local/bin/sing-box
          for f in sing-box/source/*.json; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .json)
            sing-box rule-set compile --output "sing-box/${name}.srs" "$f"
            echo "  compiled: ${name}.srs"
          done

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Surge/RULE-SET/ Surge/Module/ Quantumult/X/Filter/ Clash/RuleSet/ sing-box/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync RULE-SET → QX / Clash / sing-box [auto]"
            git push
          fi