[custom]
enable_rule_generator=true
overwrite_original_rules=true
udp=true
tfo=false
sort=false
fdn=false
expand=true
append_proxy_type=false

; ===== Rule Sets =====
; Priority order matches Profile.conf

; Unbreak
ruleset=🔘 DIRECT,https://raw.githubusercontent.com/HotKids/Rules/master/Surge/RULE-SET/Unbreak.list
; Private
ruleset=🔘 DIRECT,https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/private.txt
; HTTPDNS Block
ruleset=🚧 AdGuard,https://raw.githubusercontent.com/VirgilClyne/GetSomeFries/main/ruleset/HTTPDNS.Block.list
; Advertising
ruleset=🚧 AdGuard,https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/reject.txt
ruleset=🚧 AdGuard,https://raw.githubusercontent.com/HotKids/Rules/master/Surge/RULE-SET/AD.list
ruleset=🚧 AdGuard,https://raw.githubusercontent.com/ConnersHua/RuleGo/master/Surge/Ruleset/Extra/Reject/Advertising.list
; Privacy
ruleset=🚧 AdGuard,https://raw.githubusercontent.com/ConnersHua/RuleGo/master/Surge/Ruleset/Extra/Reject/Tracking.list
; Hijacking
ruleset=🚧 AdGuard,https://raw.githubusercontent.com/ConnersHua/RuleGo/master/Surge/Ruleset/Extra/Reject/Malicious.list
; Streaming by Region
ruleset=🇨🇳 Taiwan,https://raw.githubusercontent.com/HotKids/Rules/master/Surge/RULE-SET/Streaming_TW.list
ruleset=🇯🇵 Japan,https://raw.githubusercontent.com/HotKids/Rules/master/Surge/RULE-SET/Streaming_JP.list
ruleset=🇺🇸 America,https://raw.githubusercontent.com/HotKids/Rules/master/Surge/RULE-SET/Streaming_US.list
; Streaming Global
ruleset=🎬 Streaming,https://raw.githubusercontent.com/HotKids/Rules/master/Surge/RULE-SET/Streaming.list
; CNTV
ruleset=📺 CNTV,https://raw.githubusercontent.com/HotKids/Rules/master/Surge/RULE-SET/CNTV.list
; AIGC
ruleset=🔍 Google,https://raw.githubusercontent.com/HotKids/Rules/master/Surge/RULE-SET/Gemini.list
ruleset=🤖 AIGC,https://raw.githubusercontent.com/HotKids/Rules/master/Surge/RULE-SET/GenAI.list
; Apple
ruleset=🔰 Proxy,https://raw.githubusercontent.com/HotKids/Rules/master/Surge/RULE-SET/Apple/iCloud.PrivateRelay.list
ruleset=🇺🇸 America,https://raw.githubusercontent.com/egwj/Rules/master/Surge/RULE-SET/Apple/Apple%20News.list
ruleset=🍏 Apple TV,https://raw.githubusercontent.com/HotKids/Rules/master/Surge/RULE-SET/Apple/Apple%20TV.list
ruleset=🔘 DIRECT,https://raw.githubusercontent.com/egwj/Rules/master/Surge/RULE-SET/Apple/Apple%20CN.list
ruleset=🍎 Apple,https://raw.githubusercontent.com/egwj/Rules/master/Surge/RULE-SET/Apple/Apple.list
; Crypto
ruleset=🪙 Crypto,https://raw.githubusercontent.com/HotKids/Rules/master/Surge/RULE-SET/Crypto.list
; Google
ruleset=🔍 Google,https://raw.githubusercontent.com/egwj/Rules/master/Surge/RULE-SET/Google.list
; Finance
ruleset=💳 Credit,https://raw.githubusercontent.com/HotKids/Rules/master/Surge/RULE-SET/Credit.list
ruleset=💳 Credit,https://raw.githubusercontent.com/egwj/Rules/master/Surge/RULE-SET/PayPal.list
; Telegram
ruleset=📬 Telegram,https://raw.githubusercontent.com/egwj/Rules/master/Surge/RULE-SET/Telegram.list
; Mail
ruleset=📧 Mail,https://raw.githubusercontent.com/HotKids/Rules/master/Surge/RULE-SET/Spark.list
; Proxy
ruleset=🔰 Proxy,https://raw.githubusercontent.com/HotKids/Rules/master/Surge/RULE-SET/Proxy.list
ruleset=🔰 Proxy,https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/proxy.txt
; China
ruleset=🔘 DIRECT,https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/direct.txt
ruleset=🔘 DIRECT,https://raw.githubusercontent.com/VirgilClyne/GetSomeFries/main/ruleset/ASN.China.list
ruleset=🔘 DIRECT,https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/cncidr.txt
; Final
ruleset=🔰 Proxy,[]MATCH

; ===== Proxy Groups =====

; All nodes (used as source for regional groups)
custom_proxy_group=🇺🇳 Server`select`.*

